version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: finance-ai-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DATABASE_URL=sqlite+aiosqlite:///./finance_ai.db
      - USE_SHEETS_FOR_DEMO=true
      - LOG_LEVEL=INFO
    volumes:
      - ./app:/app
      - ./data:/app/data
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - finance-ai-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/v1/health']
      interval: 10s
      timeout: 5s
      retries: 3

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finance-ai-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - finance-ai-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  finance-ai-network:
    driver: bridge
